<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOSS AI — Authorization Callback</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.6; }
        h1 { color: #1a1a1a; border-bottom: 2px solid #e0e0e0; padding-bottom: 12px; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .code-box { background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 16px 0; word-break: break-all; font-family: monospace; font-size: 14px; }
        .label { font-weight: bold; margin-top: 12px; }
        .instructions { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 16px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>VOSS AI — QuickBooks Authorization</h1>
    <div id="content"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const realmId = params.get('realmId');
        const error = params.get('error');
        const el = document.getElementById('content');

        if (error) {
            el.innerHTML = '<h2 class="error">Authorization Failed</h2><p>Error: ' + error + '</p><p>Please try again.</p>';
        } else if (code && realmId) {
            el.innerHTML = '<h2 class="success">Authorization Successful!</h2>' +
                '<div class="instructions"><strong>Send both values below to Voss in Telegram:</strong></div>' +
                '<p class="label">Authorization Code:</p>' +
                '<div class="code-box" id="code">' + code + '</div>' +
                '<p class="label">Realm ID (Company ID):</p>' +
                '<div class="code-box" id="realm">' + realmId + '</div>' +
                '<p>Copy and paste these into Telegram. Do not share them with anyone else.</p>';
        } else {
            el.innerHTML = '<h2 class="error">Missing Parameters</h2><p>No authorization code received. Please try the authorization process again.</p>';
        }
    </script>
</body>
</html>
